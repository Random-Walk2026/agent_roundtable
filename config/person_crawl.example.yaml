# Example registry for person_crawl_agent.
# Copy to config/person_crawl.yaml (gitignored) and fill in your local targets.
# spider_base_path can be overridden by SPIDER_BASE_PATH in .env

spider_base_path: ~/GitHub/spider

defaults:
  x:
    mode: with_replies
    options:
      file-filter: "False"
  weibo:
    since_date: 7
    end_date: now
    modes:
      - posts

people:
  example_person:
    display_name: Example Person
    x:
      user: example_handle
      mode: with_replies
      options:
        file-filter: "False"
    weibo:
      id: "0000000000"
      name: example_weibo_name
      modes: [posts]